<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>유 명 · Software Engineer Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600;1,700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- set theme before paint to avoid flash, and so the 3D bg inits with the right palette -->
  <script>
    try {
      var stored = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", stored === "dark" ? "dark" : "light");
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "light");
    }
  </script>
</head>
<body>
  <!-- fixed Three.js background canvas -->
  <canvas id="three-bg"></canvas>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
